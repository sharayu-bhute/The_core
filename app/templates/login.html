<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Samadhan</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <header class="site-header">
    <a href="/" class="logo">Samadhan</a>
    
    <nav>
      <a href="{{ url_for('auth.signup') }}">Create account</a>
    </nav>
  </header>

  <div class="page-wrapper">
    <div class="container fade-up">

      <p class="hero-eyebrow">Welcome back</p>
      <h1 class="page-title">Sign in</h1>
      <p class="page-subtitle">Continue to your Samadhan dashboard.</p>

      <!-- ✅ FORM START (MOVED HERE) -->
      <form method="POST" action="{{ url_for('auth.login') }}">

        <div class="form-group">
          <label for="role">Login as</label>
          <select id="role" name="role" required>
            <option value="">Select Role</option>
            <option value="user">User</option>
            <option value="admin">Admin</option>
          </select>
        </div>

        <div class="form-group">
          <label for="email">Email address</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="you@example.com" 
            required
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            placeholder="Enter your password" 
            required
          >
        </div>

        <button type="submit" id="loginBtn">
          Sign In
        </button>

      </form>
      <!-- ✅ FORM END -->

      <div id="message"></div>

      <div class="link-row">
        Don't have an account? 
        <a href="{{ url_for('auth.signup') }}">Create one</a>
      </div>

    </div>
  </div>

</body>
</html>
