<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Samadhan</title>

  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <header class="site-header">
   <div class="nav_logo">
     <a href="/" class="logo">Samadhan</a>
     <a href="/">Home</a>
   </div>

    <nav>
      <a href="{{ url_for('auth.signup') }}">Create account</a>
    </nav>
  </header>

  <!-- ✅ FORM START -->
  <form method="POST" action="{{ url_for('auth.login') }}">

  <div class="page-wrapper">
    <div class="container fade-up">

      <p class="hero-eyebrow">Welcome back</p>
      <h1 class="page-title">Sign in</h1>
      <p class="page-subtitle">Continue to your Samadhan dashboard.</p>

      <div class="form-group">
        <label for="email">Email address</label>
        <input 
          type="email" 
          id="email" 
          name="email"
          placeholder="you@example.com" 
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password"
          placeholder="Enter your password" 
          required
        >
      </div>

      <!-- ✅ SUBMIT BUTTON -->
      <button type="submit" id="loginBtn">
        Sign In
      </button>

      <div id="message"></div>

      <div class="link-row">
        Don't have an account? 
        <a href="{{ url_for('auth.signup') }}">Create one</a>
      </div>

    </div>
  </div>

  </form>
  <!-- ✅ FORM END -->

</body>
</html>
