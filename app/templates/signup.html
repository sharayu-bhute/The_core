<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — Samadhan</title>

  <!-- ✅ FIXED PATH -->
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

  <header class="site-header">
    <a href="/" class="logo">Samadhan</a>
    <nav>
      <a href="/login">Already have an account?</a>
    </nav>
  </header>

  <div class="page-wrapper">
    <div class="container fade-up">

      <p class="hero-eyebrow">Join Samadhan</p>
      <h1 class="page-title">Create account</h1>
      <p class="page-subtitle">Start reporting civic issues in your area.</p>

      <!-- ✅ FORM ADDED -->
      <form method="POST" action="{{ url_for('auth.signup') }}" >

      <div class="form-group">
        <label for="role_name">Role Name</label>
        
        <select id="role_name" name="role_name" required>
          <option value="">Select Role</option>
          <option value="user">User</option>
          <option value="admin">Admin</option>
          <option value="worker">Worker</option>
        </select>
      </div>

        <div class="form-group">
          <label for="name">Full Name</label>
          <input 
            type="text" 
            id="name" 
            name="name"
            placeholder="Enter your name"
            required
            autocomplete="name"
          >
        </div>

        <div class="form-group">
          <label for="email">Email Address</label>
          <input 
            type="email" 
            id="email" 
            name="email"
            placeholder="Enter your email"
            required
            autocomplete="email"
          >
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input 
            type="password" 
            id="password" 
            name="password"
            placeholder="Create password"
            required
            minlength="6"
            autocomplete="new-password"
          >
        </div>

        <!-- ✅ Button now submits form -->
        <button type="submit" id="signupBtn">
          <span id="signupText">Signup</span>
        </button>

      </form>

      <div id="message"></div>

      <div class="link-row">
        Already have an account? <a href="/login">Sign in</a>
      </div>

    </div>
  </div>

</body>
</html>
