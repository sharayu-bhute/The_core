<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Dashboard — Samadhan</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body>

  <header class="site-header">
    <a href="/" class="logo">Samadhan <span></span></a>
    <nav>
      <button class="btn-ghost" onclick="logout()" style="padding:0.4rem 1rem;font-size:0.85rem;">Sign Out</button>
    </nav>
  </header>

  <div class="page-wrapper dashboard-layout">
    <div class="dashboard-grid" style="padding-bottom:3rem;">

      <!-- Sidebar -->
      <aside class="sidebar fade-up">
        <div class="brand">Samadhan</div>
        <nav>
          <a href="/dashboard" class="active">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
            My Issues
          </a>
          <a href="/upload">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            Report New Issue
          </a>
        </nav>
        <hr class="section-sep">
        <button class="btn-ghost w-full" onclick="logout()" style="margin-top:0.5rem;font-size:0.85rem;">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4M16 17l5-5-5-5M21 12H9"/></svg>
          Sign Out
        </button>
      </aside>

      <!-- Main -->
      <main class="main-content fade-up fade-up-delay-1">

        <div class="dash-header">
          <h1 class="dash-title">My Reports</h1>
          <a href="/upload" class="btn btn-secondary">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
            New Report
          </a>
        </div>

        <!-- Stats -->
        <div class="stats-row" id="statsRow">
          <div class="stat-card">
            <div class="stat-number" id="statTotal">—</div>
            <div class="stat-label">Total</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="statPending">—</div>
            <div class="stat-label">Pending</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" id="statResolved">—</div>
            <div class="stat-label">Resolved</div>
          </div>
        </div>

        <!-- Issues grid -->
        <div class="issues-grid" id="issues">
          <!-- Loaded by JS -->
          <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);" id="emptyState">
            <div style="font-size:2.5rem;margin-bottom:0.75rem;">📭</div>
            <p style="font-weight:600;">No issues reported yet</p>
            <p style="font-size:0.875rem;margin-top:0.3rem;">When you report a civic issue, it will appear here.</p>
            <a href="/upload" class="btn" style="width:auto;margin-top:1.25rem;display:inline-flex;">
              Report your first issue →
            </a>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="/static/js/app.js"></script>
  <script>
    // Status badge helper
    function statusBadge(status) {
      const map = {
        pending:  'badge-pending',
        assigned: 'badge-assigned',
        resolved: 'badge-resolved',
        rejected: 'badge-rejected'
      };
      const cls = map[(status||'').toLowerCase()] || 'badge-pending';
      return `<span class="badge ${cls}">${status || 'Pending'}</span>`;
    }

    // Override loadIssues to render beautifully
    async function loadIssues() {
      try {
        const res  = await fetch('/my-complaints');
        const data = await res.json();
        const container = document.getElementById('issues');
        const empty     = document.getElementById('emptyState');

        if (!data.length) { empty.style.display = 'block'; return; }
        empty.style.display = 'none';

        // Stats
        document.getElementById('statTotal').textContent   = data.length;
        document.getElementById('statPending').textContent = data.filter(i => (i.status||'').toLowerCase() === 'pending').length;
        document.getElementById('statResolved').textContent= data.filter(i => (i.status||'').toLowerCase() === 'resolved').length;

        container.innerHTML = data.map((issue, idx) => `
          <div class="card reveal" style="animation-delay:${idx * 0.05}s">
            ${issue.image_path ? `<img src="${issue.image_path}" alt="${issue.issue_type}">` : ''}
            <div class="card-header">
              <div>
                <div class="card-title">${issue.issue_type || 'Unclassified'}</div>
                <div class="card-meta" style="margin-top:0.25rem">${issue.location || ''}</div>
              </div>
              ${statusBadge(issue.status)}
            </div>
            <div style="font-size:0.8rem;color:var(--text-muted);">
              ${issue.assigned_to ? `Assigned to: <strong>${issue.assigned_to}</strong>` : 'Not yet assigned'}
            </div>
          </div>
        `).join('');

        // Scroll reveal
        const io = new IntersectionObserver(entries => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); io.unobserve(e.target); } });
        }, { threshold: 0.1 });
        document.querySelectorAll('.card.reveal').forEach(el => io.observe(el));

      } catch (err) {
        console.log('Dashboard not ready:', err);
      }
    }

    loadIssues();
  </script>

</body>
</html>
