<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — Samadhan</title>
  <link rel="stylesheet" href="static\css\style.css">
</head>
<body>

  <header class="site-header">
    <a href="/" class="logo">Samadhan <span></span></a>
    <nav>
      <a href="/signup">Create account</a>
    </nav>
  </header>

  <div class="page-wrapper">
    <div class="container fade-up">

      <p class="hero-eyebrow" style="justify-content:flex-start;margin-bottom:0.75rem;">
        Welcome back
      </p>
      <h1 class="page-title">Sign in</h1>
      <p class="page-subtitle">Continue to your Samadhan dashboard.</p>

      <div class="form-group">
        <label for="email">Email address</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
      </div>

      <button onclick="login()" id="loginBtn">
        <span id="loginText">Sign In</span>
        <span id="loginSpinner" style="display:none">
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
          <span class="loading-dot"></span>
        </span>
      </button>

      <div id="message"></div>

      <div class="link-row">
        Don't have an account? <a href="/signup">Create one</a>
      </div>

    </div>
  </div>

  <script src="/static/js/auth.js"></script>
  <script>
    // Enhanced login with loading state
    const _login = window.login;
    window.login = function() {
      const btn = document.getElementById('loginBtn');
      document.getElementById('loginText').style.display = 'none';
      document.getElementById('loginSpinner').style.display = 'flex';
      btn.disabled = true;
      if (typeof _login === 'function') _login();
      // Re-enable if auth.js doesn't navigate
      setTimeout(() => {
        btn.disabled = false;
        document.getElementById('loginText').style.display = 'inline';
        document.getElementById('loginSpinner').style.display = 'none';
      }, 4000);
    };

    // Allow Enter key
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') window.login();
    });

    // Show message helper
    function showMsg(text, type='error') {
      const m = document.getElementById('message');
      m.textContent = text;
      m.className = `message show ${type}`;
    }
  </script>

</body>
</html>
