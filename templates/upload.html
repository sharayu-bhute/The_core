<!DOCTYPE html>
<html>
<head>
  <title>Samadhan - Report Issue</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

<div class="container">
  <h1>Report Civic Issue</h1>

  <input type="file" id="imageInput" accept="image/*">

  <div class="toggle">
    <label>
      <input type="checkbox" id="locationToggle" checked>
      Use Current Location
    </label>
  </div>

  <input type="text" id="manualLocation" placeholder="Enter location manually">

  <button onclick="getLocation()">Fetch Location</button>
  <button onclick="submitIssue()">Submit Issue</button>

  <div id="loading"></div>
  <div id="result"></div>
</div>

<script src="/static/js/app.js"></script>

</body>
</html>
